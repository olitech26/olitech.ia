<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><title>OLITECH I.A V3.1</title><link rel="stylesheet" href="/style.css"/></head><body>
<div id="loginScreen" class="login"><div class="card"><div class="logo" data-logo>IA</div><h1 data-app-name>OLITECH I.A V3.1</h1><p>Assistente profissional da Olitech</p><form id="loginForm"><label>Usuário</label><input id="username" placeholder="Digite seu usuário"/><label>Senha</label><input id="password" type="password" placeholder="Digite sua senha"/><button>Entrar</button></form><p id="loginError" class="error"></p></div></div>
<div id="appScreen" class="app hidden"><aside id="sidebar"><div class="brand"><div class="slogo" data-logo>IA</div><div><h2 data-app-name>OLITECH I.A V3.1</h2><p id="userInfo"></p></div></div><button id="newChatBtn" class="secondary">+ Novo chat</button><label>Modo</label><select id="mode"><option value="pesquisa" selected>Pesquisa</option><option value="rapido">Rápido</option><option value="tecnico">Técnico</option><option value="atendimento">Atendimento</option><option value="programador">Programador</option><option value="marketing">Marketing</option><option value="imagem">Imagem</option><option value="editarImagem">Editar imagem</option><option value="video">Vídeo</option><option value="documentos">Documentos</option><option value="sites">Sites</option><option value="codigo">Código</option><option value="arquivos">Arquivos</option></select><div class="tool-grid"><button id="toolImage">🖼️ Imagem</button><button id="toolEditImage">✏️ Editar</button><button id="toolVideo">🎥 Vídeo</button><button id="toolDoc">📄 Doc</button><button id="toolSite">🌐 Site</button><button id="toolCode">💻 Código</button></div><div class="quick"><button class="example">Pesquise e crie um site para assistência técnica Olitech</button><button class="example">Crie uma imagem estilo propaganda para manutenção de notebook</button><button class="example">Gere um sistema HTML simples de orçamento</button></div><div id="adminBar" class="admin-bar hidden"><button id="usersBtn">👥</button><button id="settingsBtn">⚙️</button></div><button id="logoutBtn" class="secondary">Sair</button></aside><main><header><button id="menuBtn" class="icon-btn">☰</button><div><h1 data-app-name>OLITECH I.A V3.1</h1><p id="subtitle">Pesquisa, sistemas, sites, imagens, vídeos, documentos e atendimento.</p></div></header><section id="chat" class="chat"></section><form id="chatForm" class="composer"><label class="file-btn" for="fileInput">📎</label><input id="fileInput" type="file" multiple accept=".txt,.csv,.json,.log,.md,.html,.css,.js,.xml,.pdf,.docx,.xlsx,.xls,image/*"/><textarea id="message" rows="1" placeholder="Mensagem para OLITECH I.A..."></textarea><button id="sendBtn">Enviar</button></form></main></div><div id="overlay" class="overlay hidden"></div>
<div id="usersModal" class="modal hidden"><div class="modal-card wide"><div class="head"><h2>Usuários</h2><div><button id="newUserBtn">Novo</button><button id="closeUsers" class="secondary">Fechar</button></div></div><form id="userForm" class="grid"><input type="hidden" id="editId"/><div><label>Nome</label><input id="userName"/></div><div><label>Login</label><input id="userLogin"/></div><div><label>Senha</label><input id="userPassword"/></div><div><label>Perfil</label><select id="userRole"><option value="admin">Admin</option><option value="atendente">Atendente</option><option value="tecnico">Técnico</option><option value="programador">Programador</option><option value="marketing">Marketing</option></select></div><label class="check"><input id="userActive" type="checkbox" checked/> Ativo</label><div class="perms"><h3>Permissões</h3><div id="permissionsGrid"></div></div><button id="saveUserBtn">Criar usuário</button><button type="button" id="clearUserBtn" class="secondary">Limpar</button></form><div id="usersList" class="users"></div><p id="usersError" class="error"></p></div></div>
<div id="settingsModal" class="modal hidden"><div class="modal-card"><div class="head"><h2>Configurações</h2><button id="closeSettings" class="secondary">Fechar</button></div><form id="settingsForm"><label>Nome</label><input id="appNameInput"/><label>Subtítulo</label><input id="subtitleInput"/><label>Tipo logo</label><select id="logoTypeInput"><option value="text">Texto</option><option value="url">URL</option><option value="local">Upload local</option></select><label>Texto</label><input id="logoTextInput"/><label>URL</label><input id="logoUrlInput"/><label>Modo padrão</label><select id="defaultModeInput"><option value="pesquisa">Pesquisa</option><option value="rapido">Rápido</option></select><label>Imagem</label><input id="logoFileInput" type="file" accept="image/*"/><input id="logoDataInput" type="hidden"/><div class="preview"><div id="logoPreview" class="slogo">IA</div></div><button>Salvar</button></form><p id="settingsError" class="error"></p></div></div><script src="/app.js"></script></body></html>
